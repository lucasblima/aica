# Supabase CLI Configuration
# https://supabase.com/docs/guides/cli/config
#
# Project: aica-staging (uzywajqzbdbrfammshdg)

[api]
enabled = true
port = 54321

# ============================================================================
# EDGE FUNCTIONS CONFIGURATION
# ============================================================================

# gemini-chat: AI operations via Gemini API
# Requires user authentication to track usage and apply rate limits
[functions.gemini-chat]
verify_jwt = true

# sync-whatsapp-contacts: Sync contacts from Evolution API to database
# Requires user authentication (function validates token internally)
# Note: Function has its own auth validation, but we keep verify_jwt = true
# for defense in depth
[functions.sync-whatsapp-contacts]
verify_jwt = true

# generate-pairing-code: Generate WhatsApp pairing code via Evolution API
# Function handles its own JWT validation for better error messages
# Setting verify_jwt = false allows function to validate and log errors
[functions.generate-pairing-code]
verify_jwt = false

# webhook-evolution: Receives webhooks from Evolution API
# No JWT required - uses API key validation instead
[functions.webhook-evolution]
verify_jwt = false

# create-user-instance: Creates Evolution API instance for new users
# Function handles its own JWT validation
[functions.create-user-instance]
verify_jwt = false

# process-edital: Processes edital PDFs via Google File Search
# Requires user authentication for document ownership
[functions.process-edital]
verify_jwt = true

# query-edital: Semantic search in edital documents
# Requires user authentication for document access control
[functions.query-edital]
verify_jwt = true
