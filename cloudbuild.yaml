# =============================================================================
# AICA Frontend - Google Cloud Build Configuration
# =============================================================================
# This file configures the CI/CD pipeline for building and deploying the
# React/Vite frontend application to Google Cloud Run.
#
# IMPORTANT: Environment variables with VITE_* prefix are injected at build time
# because Vite replaces import.meta.env.VITE_* during compilation.
# =============================================================================

# =============================================================================
# SUBSTITUTIONS - Default values for build variables
# These can be overridden in the Cloud Build trigger configuration
# =============================================================================
substitutions:
  _SERVICE_NAME: aica
  _DEPLOY_REGION: southamerica-east1
  _IMAGE_NAME: aica-frontend
  _TAG: latest
  # Required: Supabase configuration (safe to include - these are public client keys)
  _VITE_SUPABASE_URL: https://uzywajqzbdbrfammshdg.supabase.co
  _VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6eXdhanF6YmRicmZhbW1zaGRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3NTE0MjEsImV4cCI6MjA4MzMyNzQyMX0.cQHqHZtIlIzX2hucb5n53PDvGYHb43ra6G5cCTlvbl
  # Required: Frontend URL for OAuth redirect
  _VITE_FRONTEND_URL: https://aica-5562559893.southamerica-east1.run.app
  # Optional: Set these in Cloud Build trigger or leave empty
  _VITE_GOOGLE_OAUTH_CLIENT_ID: '5562559893-1ufv0knok8k4679kr35p7aqdhp55drg0.apps.googleusercontent.com'
  _VITE_PDF_EXTRACTOR_URL: ''
  _VITE_N8N_WEBHOOK_URL: 'https://n8n-n8n.w9jo16.easypanel.host/'
  _VITE_EVOLUTION_INSTANCE_NAME: ''
  _VITE_API_URL: ''
  _VITE_N8N_URL: 'https://n8n-n8n.w9jo16.easypanel.host/'
  _VITE_EVOLUTION_URL: 'https://evolution-evolution-api.w9jo16.easypanel.host/'

# =============================================================================
# SECRETS - Sensitive values from Secret Manager
# These secrets must be created in Secret Manager before running the build
# =============================================================================
# To create secrets:
#   gcloud secrets create vite-gemini-api-key --replication-policy="automatic"
#   echo -n "YOUR_KEY" | gcloud secrets versions add vite-gemini-api-key --data-file=-
#
# To grant Cloud Build access:
#   PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
#   gcloud secrets add-iam-policy-binding vite-gemini-api-key \
#     --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#     --role="roles/secretmanager.secretAccessor"
# =============================================================================
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/vite-gemini-api-key/versions/latest
      env: 'VITE_GEMINI_API_KEY'
    # SECURITY: vite-google-oauth-client-secret removed (2026-01-03)
    # OAuth client secret now stored in Supabase secrets for Edge Function use only

steps:
  # =========================================================================
  # Step 0: Validate that secrets exist and were loaded
  # =========================================================================
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'validate-secrets'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "=== Validating Secrets Configuration ==="

        # Verificar se secrets existem no Secret Manager
        gcloud secrets describe vite-gemini-api-key --project=$PROJECT_ID || {
          echo "ERROR: Secret 'vite-gemini-api-key' não encontrado!"
          exit 1
        }

        # Verificar se secrets foram carregados no secretEnv
        if [ -z "$$VITE_GEMINI_API_KEY" ]; then
          echo "ERROR: VITE_GEMINI_API_KEY secret está vazio ou não foi carregado!"
          exit 1
        fi

        echo "✓ Gemini API Key: SET"
        echo "✓ Secrets validados com sucesso"
        echo "✓ OAuth client secret agora em Supabase Edge Function (secure)"
        echo "========================================"
    secretEnv: ['VITE_GEMINI_API_KEY']
    # SECURITY: VITE_GOOGLE_OAUTH_CLIENT_SECRET removed (2026-01-03)
    # OAuth client secret now in Supabase Edge Function secrets, not frontend

  # =========================================================================
  # Step 1: Build Docker image with environment variables
  # =========================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "=== Starting Docker Build with Environment Variables ==="
        echo "VITE_SUPABASE_URL: ${_VITE_SUPABASE_URL:0:40}..."
        echo "VITE_FRONTEND_URL: ${_VITE_FRONTEND_URL}"
        echo "========================================================"

        docker build \
          --build-arg VITE_SUPABASE_URL="${_VITE_SUPABASE_URL}" \
          --build-arg VITE_SUPABASE_ANON_KEY="${_VITE_SUPABASE_ANON_KEY}" \
          --build-arg VITE_FRONTEND_URL="${_VITE_FRONTEND_URL}" \
          --build-arg VITE_GEMINI_API_KEY="$$VITE_GEMINI_API_KEY" \
          --build-arg VITE_GOOGLE_OAUTH_CLIENT_ID="${_VITE_GOOGLE_OAUTH_CLIENT_ID}" \
          --build-arg VITE_PDF_EXTRACTOR_URL="${_VITE_PDF_EXTRACTOR_URL}" \
          --build-arg VITE_N8N_WEBHOOK_URL="${_VITE_N8N_WEBHOOK_URL}" \
          --build-arg VITE_N8N_URL="${_VITE_N8N_URL}" \
          --build-arg VITE_EVOLUTION_URL="${_VITE_EVOLUTION_URL}" \
          --build-arg VITE_EVOLUTION_INSTANCE_NAME="${_VITE_EVOLUTION_INSTANCE_NAME}" \
          --build-arg VITE_API_URL="${_VITE_API_URL}" \
          -t gcr.io/$PROJECT_ID/${_IMAGE_NAME}:${_TAG} \
          -t gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest \
          .
    secretEnv: ['VITE_GEMINI_API_KEY']
    # SECURITY: VITE_GOOGLE_OAUTH_CLIENT_SECRET removed (2026-01-03)
    # OAuth client secret now in Supabase Edge Function secrets, not frontend

  # =========================================================================
  # Step 2: Push image to Container Registry
  # =========================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: ['push', 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:${_TAG}']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-latest'
    args: ['push', 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest']

  # =========================================================================
  # Step 3: Deploy to Cloud Run
  # =========================================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update'
      - '$_SERVICE_NAME'
      - '--platform=managed'
      - '--image=gcr.io/$PROJECT_ID/${_IMAGE_NAME}:${_TAG}'
      - '--region=$_DEPLOY_REGION'

# =============================================================================
# OUTPUT IMAGES
# =============================================================================
images:
  - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:${_TAG}'
  - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'

# =============================================================================
# BUILD OPTIONS
# =============================================================================
options:
  logging: CLOUD_LOGGING_ONLY

# Increase timeout for larger builds (default is 10 minutes)
timeout: '1200s'
