server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ==========================================================================
    # SECURITY HEADERS
    # ==========================================================================
    
    # Content Security Policy (CSP)
    # Controls which resources the browser is allowed to load
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob: https:;
        connect-src 'self'
            https://*.supabase.co
            wss://*.supabase.co
            https://ai.google.dev
            https://generativelanguage.googleapis.com
            https://www.googleapis.com
            https://*.googleapis.com
            https://oauth2.googleapis.com
            https://accounts.google.com
            https://*.googleusercontent.com
            https://content.googleapis.com
            https://n8n-n8n.w9jo16.easypanel.host
            https://project-management-docker.w9jo16.easypanel.host
            https://project-management-metabase.w9jo16.easypanel.host
            https://evolution-evolution-api.w9jo16.easypanel.host;
        worker-src 'self' blob:;
        frame-src 'self' https://accounts.google.com;
        object-src 'none';
        base-uri 'self';
    " always;

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Enable XSS filter in browsers
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==========================================================================
    # COOKIE CONFIGURATION
    # ==========================================================================
    # Cookie handling for PKCE OAuth flow is managed by @supabase/ssr client
    # Cookies are set with: SameSite=Lax, Secure (in HTTPS), Path=/, MaxAge=7days
    # No nginx configuration needed - cookies pass through transparently

    # ==========================================================================
    # COMPRESSION
    # ==========================================================================
    
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types 
        text/plain 
        text/css 
        application/json 
        application/javascript 
        text/xml 
        application/xml 
        application/xml+rss 
        text/javascript
        application/wasm;

    # ==========================================================================
    # CACHING
    # ==========================================================================

    # Cache para assets estáticos (JS, CSS, imagens, fontes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Repetir headers de segurança (add_header em location sobrescreve os do server)
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ==========================================================================
    # ROUTES
    # ==========================================================================

    # SPA - Redirecionar tudo para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check para Cloud Run
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
        }