server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ==========================================================================
    # SECURITY HEADERS
    # ==========================================================================

    # Content Security Policy (CSP)
    # Controls which resources the browser is allowed to load
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://withcallout.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob: https:;
        connect-src 'self'
            https://*.supabase.co
            wss://*.supabase.co
            https://ai.google.dev
            https://generativelanguage.googleapis.com
            wss://generativelanguage.googleapis.com
            https://www.googleapis.com
            https://*.googleapis.com
            https://oauth2.googleapis.com
            https://accounts.google.com
            https://*.googleusercontent.com
            https://content.googleapis.com
            https://withcallout.com
            https://*.withcallout.com
            https://*.ingest.de.sentry.io;
        worker-src 'self' blob:;
        frame-src 'self' https://accounts.google.com;
        object-src 'none';
        base-uri 'self';
    " always;

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS filter in browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==========================================================================
    # COOKIE CONFIGURATION
    # ==========================================================================
    # Cookie handling for PKCE OAuth flow is managed by @supabase/ssr client
    # Cookies are set with: SameSite=Lax, Secure (in HTTPS), Path=/, MaxAge=7days
    # No nginx configuration needed - cookies pass through transparently

    # ==========================================================================
    # COMPRESSION
    # ==========================================================================

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        application/wasm;

    # ==========================================================================
    # CACHING
    # ==========================================================================

    # Service worker files — NEVER cache (must be fresh on every load)
    location ~* ^/(sw\.js|workbox-.*)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # sw-share-target.js — no hash in filename, must not be cached
    location = /sw-share-target.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # .mjs files outside /assets/ (e.g., pdf.worker.min.mjs from public/)
    # nginx default mime.types doesn't include .mjs → falls back to octet-stream
    # Browsers reject non-JS MIME types for module scripts (X-Content-Type-Options: nosniff)
    location ~* \.mjs$ {
        types { application/javascript mjs; }
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Hashed assets (/assets/*) — immutable cache, hard 404 if missing
    # KEY FIX: =404 prevents nginx from returning index.html for missing assets
    # Without this, Workbox receives HTML instead of 404, causing bad-precaching-response
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;

        # .mjs files (ES modules, PDF.js worker) need explicit MIME type
        # nginx default mime.types doesn't include .mjs → served as octet-stream
        # With X-Content-Type-Options: nosniff, browser rejects non-JS MIME for scripts
        location ~* \.mjs$ {
            types { application/javascript mjs; }
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }
    }

    # Other static files (images, fonts) — immutable cache, hard 404 if missing
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ==========================================================================
    # ROUTES
    # ==========================================================================

    # SPA fallback — navigation requests only (assets handled above with =404)
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must never be cached (references hashed assets + sw.js)
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # Health check para Cloud Run
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
        }
