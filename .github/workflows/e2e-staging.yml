name: E2E Tests on Staging

on:
  # Cron: 6h BRT = 09:00 UTC (diario)
  schedule:
    - cron: '0 9 * * *'
  # Manual trigger
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Playwright test filter (e.g. "auth" or "journey")'
        required: false
        default: ''

env:
  STAGING_URL: https://aica-staging-5562559893.southamerica-east1.run.app

jobs:
  health-check:
    name: Staging Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check staging is alive
        run: |
          echo "Checking staging at $(date -u '+%Y-%m-%d %H:%M UTC')"
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' ${{ env.STAGING_URL }})
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "Staging is UP"
          else
            echo "Staging returned $HTTP_STATUS"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Staging Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** ${{ env.STAGING_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (UTC):** $(date -u '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  e2e-tests:
    name: Playwright E2E on Staging
    needs: health-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run E2E if secrets are configured
    if: ${{ vars.E2E_ENABLED == 'true' }}

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against staging
        run: |
          npx playwright test \
            --project=setup --project=unauthenticated \
            ${{ github.event.inputs.test_filter && format('--grep "{0}"', github.event.inputs.test_filter) || '' }}
        env:
          CI: true
          VITE_APP_URL: ${{ env.STAGING_URL }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** ${{ env.STAGING_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run:** [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
